# this module defines project caches for task runners
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: habiting-cache-lint
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: habiting-cache-test
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: habiting-cache-build
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
