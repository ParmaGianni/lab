apiVersion: v1
kind: Service
metadata:
  name: forgejo-svc
spec:
  selector:
    app: forgejo
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: ssh
    port: 22
    targetPort: ssh
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo-ingress
spec:
  entryPoints:
  - websecure-ext
  routes:
  - match: Host(`fj.jonsimeon.com`)
    services:
    - name: forgejo-svc
      port: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: forgejo-ssh-ingress
spec:
  entryPoints:
  - ssh
  routes:
  - match: HostSNI(`*`)
    services:
    - name: forgejo-svc
      port: ssh
      nativeLB: true
