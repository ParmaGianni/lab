apiVersion: v1
kind: Service
metadata:
  name: forgejo-svc
spec:
  selector:
    app: forgejo
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: ssh
    port: 22
    targetPort: ssh
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo-ingress
spec:
  entrypoints:
  - web-ext
  routes:
  - services:
    - name: forgejo-svc
      port: http
      nativeLB: true
