apiVersion: v1
kind: Service
metadata:
  name: traefik-int
spec:
  ports:
  - name: web
    port: 80
    targetPort: web
  - name: websecure
    port: 443
    targetPort: websecure
  - name: nfs
    port: 2049
    targetPort: nfs
  - name: pals
    port: 8211
    protocol: UDP
    targetPort: pals
  - name: ssh
    port: 22
    targetPort: ssh
  selector:
    app.kubernetes.io/name: traefik
  type: LoadBalancer
  loadBalancerClass: tailscale
